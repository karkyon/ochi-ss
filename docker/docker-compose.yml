version: "3.9"

# =============================================================
#  Ochi-ss Web Order System — Docker Compose
#  対象環境: Ubuntu 24.04 / 192.168.1.11
#  本番: Azure VPS 1本にすべて同居
# =============================================================

networks:
  ochi_internal:
    driver: bridge

services:
  # -----------------------------------------------------------
  # PostgreSQL 16
  # -----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: ochi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ochi_ss
      POSTGRES_USER: ochi_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Tokyo
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5455:5432"   # ローカルのみ公開（外部非公開）
    networks:
      - ochi_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ochi_app -d ochi_ss"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------
  # Redis 7
  # -----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ochi_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6479:6379"   # ローカルのみ
    networks:
      - ochi_internal
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------
  # Next.js 15 (Frontend + BFF)
  # -----------------------------------------------------------
  web:
    build:
      context: ../
      dockerfile: docker/Dockerfile.web
      args:
        NODE_ENV: production
    container_name: ochi_web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://ochi_app:${POSTGRES_PASSWORD}@postgres:5432/ochi_ss
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}          # AES-256-GCM キー（32byte hex）
      HMAC_KEY: ${HMAC_KEY}                      # メールアドレス検索用 HMAC キー
      DOTNET_API_URL: http://api:5000
      TZ: Asia/Tokyo
    ports:
      - "127.0.0.1:3050:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ochi_internal

  # -----------------------------------------------------------
  # .NET 9 Web API（SQL Server SP呼び出し専用）
  # -----------------------------------------------------------
  api:
    build:
      context: ../
      dockerfile: docker/Dockerfile.api
    container_name: ochi_dotnet_api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      SqlServer__ConnectionString: ${SQLSERVER_CONNECTION_STRING}
      TZ: Asia/Tokyo
    ports:
      - "127.0.0.1:5050:5000"
    networks:
      - ochi_internal

  # -----------------------------------------------------------
  # Sync Service（Transactional Outbox + Polling Worker）
  # -----------------------------------------------------------
  sync-service:
    build:
      context: ../sync-service
      dockerfile: Dockerfile
    container_name: ochi_sync
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://ochi_app:${POSTGRES_PASSWORD}@postgres:5432/ochi_ss
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      SQLSERVER_CONNECTION_STRING: ${SQLSERVER_CONNECTION_STRING}
      OUTBOX_POLL_INTERVAL_MS: 5000          # Web→業務: 5秒
      BIZPOLL_INTERVAL_MS: 30000             # 業務→Web: 30秒
      NODE_ENV: production
      TZ: Asia/Tokyo
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ochi_internal

  # -----------------------------------------------------------
  # Cron（Draft クリーンアップ・定期バッチ）
  # -----------------------------------------------------------
  cron:
    image: node:20-alpine
    container_name: ochi_cron
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../:/app:ro
      - cron_logs:/var/log/ochi
    environment:
      DATABASE_URL: postgresql://ochi_app:${POSTGRES_PASSWORD}@postgres:5432/ochi_ss
      TZ: Asia/Tokyo
    depends_on:
      postgres:
        condition: service_healthy
    # 毎日0時にDraft期限切れクリーンアップを実行
    command: >
      sh -c "
        apk add --no-cache dcron &&
        echo '0 0 * * * cd /app && npx ts-node --project tsconfig.json scripts/cleanup-expired-drafts.ts >> /var/log/ochi/cleanup.log 2>&1' | crontab - &&
        crond -f -l 2
      "
    networks:
      - ochi_internal

  # -----------------------------------------------------------
  # Caddy（リバースプロキシ + 自動HTTPS）
  # -----------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    container_name: ochi_caddy
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    networks:
      - ochi_internal

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
  cron_logs:
